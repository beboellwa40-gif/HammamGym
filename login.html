<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hammam Gym Login</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0d0d0d;
    font-family:Inter,sans-serif;
}

.login-card{

    width:420px;
    background:#181818;
    border:1px solid #2a2a2a;
    border-radius:15px;
    padding:40px;

}

h1{

    font-family:'Bebas Neue';
    letter-spacing:2px;
    color:#fff;
    text-align:center;
    margin:0;

}

.subtitle{

    color:#999;
    text-align:center;
    margin-bottom:35px;

}

input{

    width:100%;
    padding:13px;
    margin-bottom:15px;
    background:#111;
    border:1px solid #333;
    color:white;
    border-radius:8px;
    font-size:15px;
    box-sizing:border-box;

}

input:focus{

    outline:none;
    border-color:#C8102E;

}

button{

    width:100%;
    padding:14px;
    border:none;
    background:#C8102E;
    color:white;
    border-radius:8px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;

}

button:hover{

    background:#9B0C22;

}

.error{

    color:#ff5d5d;
    margin-top:15px;
    text-align:center;

}

.demo{

    margin-top:30px;
    border-top:1px solid #333;
    padding-top:20px;
    font-size:13px;
    color:#aaa;

}

.demo table{

    width:100%;

}

.demo td{

    padding:3px;

}

</style>

</head>
<body>

<div class="login-card">

<h1>HAMMAM GYM</h1>

<div class="subtitle">
Gym Management System
</div>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<div class="error" id="error"></div>

<div class="demo">

<b>Demo Accounts</b>

<table>

<tr>
<td>manager</td>
<td>123456</td>
</tr>

<tr>
<td>coach</td>
<td>123456</td>
</tr>

<tr>
<td>trainee</td>
<td>123456</td>
</tr>

<tr>
<td>receptionist</td>
<td>123456</td>
</tr>

<tr>
<td>cafeteria</td>
<td>123456</td>
</tr>

</table>

</div>

</div>

<script>

const users={

manager:{
password:"123456",
role:"manager"
},

coach:{
password:"123456",
role:"coach"
},

trainee:{
password:"123456",
role:"trainee"
},

receptionist:{
password:"123456",
role:"receptionist"
},

cafeteria:{
password:"123456",
role:"cafeteria"
}

}

function login(){

const username=document.getElementById("username").value.trim().toLowerCase();

const password=document.getElementById("password").value;

const user=users[username];

if(!user){

document.getElementById("error").innerHTML="Invalid username.";

return;

}

if(user.password!=password){

document.getElementById("error").innerHTML="Incorrect password.";

return;

}

localStorage.setItem("loggedIn","true");

localStorage.setItem("role",user.role);

window.location="prototype.html";

}

</script>

</body>
</html>
